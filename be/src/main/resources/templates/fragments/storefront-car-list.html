<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Phân công: Hiệp Hiếu — fragment danh sách xe (index & /cars).
  Fragment danh sách xe: trang chủ (index) và /cars (list).
  Model: carItems, favoriteDefinitionIds, page, carListOnHome, searchQuery, listingFilter
-->
<th:block th:fragment="carListingContent">
    <div class="visually-hidden storefront-listing-meta" th:attr="data-total-elements=${page.totalElements}"></div>
    <div th:if="${#lists.isEmpty(carItems)}"
         class="storefront-car-list-empty text-center py-5 px-3 rounded-4 border border-dashed bg-body-secondary bg-opacity-25">
        <p class="text-muted mb-2 mb-md-3">
            <i class="bi bi-search display-6 d-block opacity-50" aria-hidden="true"></i>
        </p>
        <p class="fw-medium text-body mb-1">Không tìm thấy mẫu xe phù hợp</p>
        <p class="small text-muted mb-0">Thử từ khóa khác (hãng, dòng xe, phân khúc hoặc năm).</p>
    </div>
    <th:block th:unless="${#lists.isEmpty(carItems)}">
        <div class="row row-cols-1 row-cols-md-2 row-cols-xl-3 g-4">
            <div class="col" th:each="item : ${carItems}">
                <article class="card car-card car-card-store h-100 border-0 shadow-sm">
                    <a th:href="@{|/cars/${item.definition.id}|}"
                       class="car-card-store__media ratio ratio-16x9 bg-light text-decoration-none">
                        <img th:if="${item.definition.coverImageUrl != null}"
                             th:src="${item.definition.coverImageUrl}"
                             class="object-fit-cover" alt="Ảnh xe">
                        <div th:unless="${item.definition.coverImageUrl != null}"
                             class="d-flex align-items-center justify-content-center text-muted small h-100">
                            Chưa có ảnh
                        </div>
                    </a>
                    <div class="card-body d-flex flex-column pt-3 pb-3 px-3">
                        <div class="d-flex justify-content-between align-items-start gap-2 mb-2">
                            <h2 class="h6 card-title car-card-store__title mb-0 flex-grow-1 lh-sm">
                                <a th:href="@{|/cars/${item.definition.id}|}" class="text-reset text-decoration-none"
                                   th:text="${@carDefinitionLabelFormatter.formatListingTitle(item.definition)}">Tên xe</a>
                            </h2>
                            <button type="button"
                                    class="btn btn-sm rounded-circle car-card-store__fav border-0 flex-shrink-0"
                                    th:classappend="${favoriteDefinitionIds.contains(item.definition.id)} ? 'car-card-store__fav--on' : ''"
                                    th:attr="data-car-id=${item.definition.id}"
                                    th:title="${favoriteDefinitionIds.contains(item.definition.id)} ? 'Bỏ yêu thích' : 'Yêu thích'"
                                    aria-label="Yêu thích"
                                    onclick="toggleFavoriteFromList(event, this)">
                                <i th:class="${favoriteDefinitionIds.contains(item.definition.id)} ? 'bi bi-heart-fill' : 'bi bi-heart'"></i>
                            </button>
                        </div>
                        <div class="d-flex flex-wrap align-items-center gap-2 mb-3 small">
                            <span class="badge rounded-pill bg-body-secondary text-body-secondary fw-normal"
                                  th:text="|${item.definition.productionYear}|">2024</span>
                            <span th:if="${item.totalStock == 0}"
                                  class="badge rounded-pill text-bg-danger">Hết xe</span>
                            <span th:if="${item.totalStock > 0}"
                                  class="badge rounded-pill text-bg-success-subtle text-success border border-success-subtle">Còn hàng</span>
                        </div>
                        <div class="car-card-store__price mb-3">
                            <span th:if="${item.definition.promoPrice != null}">
                                <span class="text-muted text-decoration-line-through small d-block"
                                      th:text="|${#numbers.formatDecimal(item.definition.salePrice, 0, 'COMMA', 0, 'POINT')} đ|"></span>
                                <span class="fs-5 fw-semibold text-danger"
                                      th:text="|${#numbers.formatDecimal(item.definition.promoPrice, 0, 'COMMA', 0, 'POINT')} đ|"></span>
                            </span>
                            <span th:if="${item.definition.promoPrice == null}">
                                <span class="fs-5 fw-semibold text-primary"
                                      th:text="|${#numbers.formatDecimal(item.definition.salePrice, 0, 'COMMA', 0, 'POINT')} đ|"></span>
                            </span>
                        </div>
                        <div class="mt-auto d-grid gap-2">
                            <a class="btn btn-primary rounded-pill py-2 fw-semibold"
                               th:href="@{|/cars/${item.definition.id}|}">Xem chi tiết</a>
                            <div class="d-flex flex-wrap justify-content-center gap-1 car-card-store__links">
                                <a class="btn btn-sm btn-link text-secondary text-decoration-none px-2 py-1"
                                   th:href="@{|/contacts/request/${item.definition.id}|}">
                                    <i class="bi bi-chat-dots me-1"></i>Liên hệ
                                </a>
                                <a class="btn btn-sm btn-link text-secondary text-decoration-none px-2 py-1"
                                   th:href="@{|/test-drives/register/${item.definition.id}|}">
                                    <i class="bi bi-calendar2-check me-1"></i>Lái thử
                                </a>
                                <button type="button"
                                        class="btn btn-sm btn-link text-secondary text-decoration-none px-2 py-1"
                                        th:attr="data-car-id=${item.definition.id}"
                                        onclick="addToCompare(this)">
                                    <i class="bi bi-intersect me-1"></i>So sánh
                                </button>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </div>

        <nav th:if="${page.totalPages > 1}" class="mt-3">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${page.number == 0} ? 'disabled'">
                    <th:block th:if="${carListOnHome}">
                        <a class="page-link"
                           th:href="@{/(page=${page.number - 1},size=${page.size},q=${listingFilter.q},brands=${listingFilter.brandsParam},models=${listingFilter.modelsParam},segments=${listingFilter.segmentsParam},inStock=${listingFilter.inStockOnly})}">&laquo;</a>
                    </th:block>
                    <th:block th:unless="${carListOnHome}">
                        <a class="page-link"
                           th:href="@{/cars(page=${page.number - 1},size=${page.size},q=${listingFilter.q},brands=${listingFilter.brandsParam},models=${listingFilter.modelsParam},segments=${listingFilter.segmentsParam},inStock=${listingFilter.inStockOnly})}">&laquo;</a>
                    </th:block>
                </li>
                <li class="page-item disabled">
                    <span class="page-link">
                        Trang <span th:text="${page.number + 1}"></span>/<span th:text="${page.totalPages}"></span>
                    </span>
                </li>
                <li class="page-item" th:classappend="${page.number + 1 >= page.totalPages} ? 'disabled'">
                    <th:block th:if="${carListOnHome}">
                        <a class="page-link"
                           th:href="@{/(page=${page.number + 1},size=${page.size},q=${listingFilter.q},brands=${listingFilter.brandsParam},models=${listingFilter.modelsParam},segments=${listingFilter.segmentsParam},inStock=${listingFilter.inStockOnly})}">&raquo;</a>
                    </th:block>
                    <th:block th:unless="${carListOnHome}">
                        <a class="page-link"
                           th:href="@{/cars(page=${page.number + 1},size=${page.size},q=${listingFilter.q},brands=${listingFilter.brandsParam},models=${listingFilter.modelsParam},segments=${listingFilter.segmentsParam},inStock=${listingFilter.inStockOnly})}">&raquo;</a>
                    </th:block>
                </li>
            </ul>
        </nav>
    </th:block>
</th:block>

<th:block th:fragment="carListing">
    <th:block th:replace="~{fragments/storefront-car-list :: carListingContent}"></th:block>
    <script th:src="@{/js/compare.js}"></script>
</th:block>
</html>
