<!DOCTYPE html>
<!-- Phân công: Hiệp Hiếu — duyệt đánh giá (admin). -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: body(~{::body})}">
<body>
<section>
    <h1 class="h4 mb-3">Duyệt đánh giá xe</h1>
    <p class="text-muted small mb-3">
        Đánh giá do khách gửi sau khi nhận xe ở trạng thái <strong>chờ duyệt</strong> cho đến khi bạn chọn hiển thị.
        Có thể ẩn lại bất kỳ lúc nào.
    </p>
    <form method="get" id="adminReviewsFilterForm" class="row g-2 mb-4 align-items-end">
        <div class="col-md-4 col-lg-3">
            <label class="form-label small mb-1">Lọc</label>
            <select name="filter" class="form-select form-select-sm" aria-label="Lọc đánh giá"
                    onchange="document.getElementById('adminReviewsFilterForm').submit()">
                <option value="all" th:selected="${filter == 'all'}">Tất cả</option>
                <option value="pending" th:selected="${filter == 'pending'}">Chờ duyệt (đang ẩn)</option>
                <option value="visible" th:selected="${filter == 'visible'}">Đang hiển thị</option>
            </select>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th scope="col" class="text-nowrap">ID</th>
                <th scope="col" class="text-nowrap">Mã mẫu xe</th>
                <th scope="col">Khách hàng</th>
                <th scope="col">Xe</th>
                <th scope="col" class="text-nowrap">Sao</th>
                <th scope="col">Nhận xét</th>
                <th scope="col" class="text-nowrap">Ngày gửi</th>
                <th scope="col">Trạng thái</th>
                <th scope="col" class="text-nowrap">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reviews}">
                <td th:text="${r.id}"></td>
                <td class="text-nowrap">
                    <span class="font-monospace" th:text="${r.carInventory.carDefinition.id}">1</span>
                    <a th:href="@{|/cars/${r.carInventory.carDefinition.id}|}"
                       class="btn btn-link btn-sm p-0 ms-1 align-baseline" target="_blank" rel="noopener"
                       title="Mở trang chi tiết đúng mẫu xe (URL /cars/{id})">
                        Xem trang
                    </a>
                </td>
                <td th:text="${r.user.fullName}"></td>
                <td th:text="${@carDefinitionLabelFormatter.format(r.carInventory.carDefinition)}"></td>
                <td th:text="${r.rating}">5</td>
                <td class="small" style="max-width: 20rem;">
                    <span th:text="${r.comment != null and !#strings.isEmpty(r.comment) ? r.comment : '—'}">—</span>
                </td>
                <td class="text-nowrap"
                    th:text="${r.createdAt != null ? #temporals.format(r.createdAt, 'dd/MM/yyyy HH:mm') : '—'}"></td>
                <td>
                    <span th:if="${r.hidden}" class="badge bg-warning text-dark">Chờ duyệt / ẩn</span>
                    <span th:unless="${r.hidden}" class="badge bg-success">Đang hiển thị</span>
                </td>
                <td>
                    <div class="d-flex flex-wrap gap-1">
                        <form th:if="${r.hidden}"
                              th:action="@{|/admin/reviews/${r.id}/approve|}" method="post" class="d-inline">
                            <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
                            <input type="hidden" name="filter" th:value="${filter}">
                            <button type="submit" class="btn btn-sm btn-success">
                                <i class="bi bi-check-lg me-1"></i>Duyệt hiển thị
                            </button>
                        </form>
                        <form th:unless="${r.hidden}"
                              th:action="@{|/admin/reviews/${r.id}/hide|}" method="post" class="d-inline">
                            <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
                            <input type="hidden" name="filter" th:value="${filter}">
                            <button type="submit" class="btn btn-sm btn-outline-secondary">
                                <i class="bi bi-eye-slash me-1"></i>Ẩn
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(reviews)}">
                <td colspan="9" class="text-center text-muted py-5">Không có đánh giá phù hợp bộ lọc.</td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
