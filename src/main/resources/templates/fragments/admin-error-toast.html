<!DOCTYPE html>
<!-- Fragment toast lỗi chung trang admin. -->
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Toast thông báo lỗi admin: cố định phía trên, có nút đóng, không đẩy nội dung -->
<div th:fragment="toast(error)" th:if="${error}"
     class="alert alert-danger alert-dismissible fade show shadow-sm border-0 position-fixed admin-error-toast"
     role="alert">
    <span class="d-flex align-items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="text-danger flex-shrink-0" viewBox="0 0 16 16">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/>
        </svg>
        <span th:text="${error}"></span>
    </span>
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Đóng"></button>
</div>
</body>
</html>
