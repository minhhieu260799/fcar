<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!-- Phân công: Hiệp Hiếu — bộ lọc storefront. Model: filterOptions, listingFilter — dùng chung index + /cars -->
<th:block th:fragment="filters">
    <div class="storefront-filters card border-0 shadow-sm">
        <div class="card-body p-3 p-lg-4">
            <h3 class="h6 fw-semibold mb-3 text-body">Bộ lọc</h3>

            <div class="storefront-filter-group mb-3">
                <div class="small text-uppercase text-secondary letter-spacing-1 mb-2">Hãng xe</div>
                <div class="storefront-filter-scroll max-h-40">
                    <div th:each="b : ${filterOptions.brands}" class="form-check">
                        <input class="form-check-input storefront-filter-brand" type="checkbox"
                               th:value="${b.id}"
                               th:id="|sf-brand-${b.id}|"
                               th:checked="${#lists.contains(listingFilter.brandIds, b.id)}">
                        <label class="form-check-label small" th:for="|sf-brand-${b.id}|" th:text="${b.name}">Hãng</label>
                    </div>
                    <p th:if="${#lists.isEmpty(filterOptions.brands)}" class="small text-muted mb-0">—</p>
                </div>
            </div>

            <div class="storefront-filter-group mb-3">
                <div class="small text-uppercase text-secondary letter-spacing-1 mb-2">Dòng xe</div>
                <div class="storefront-filter-scroll max-h-40">
                    <div th:each="m : ${filterOptions.models}" class="form-check storefront-filter-model-wrap"
                         th:attr="data-brand-id=${m.brandId}">
                        <input class="form-check-input storefront-filter-model" type="checkbox"
                               th:value="${m.id}"
                               th:id="|sf-model-${m.id}|"
                               th:checked="${#lists.contains(listingFilter.modelIds, m.id)}">
                        <label class="form-check-label small" th:for="|sf-model-${m.id}|" th:text="${m.name}">Dòng</label>
                    </div>
                    <p th:if="${#lists.isEmpty(filterOptions.models)}" class="small text-muted mb-0">—</p>
                </div>
            </div>

            <div class="storefront-filter-group mb-3">
                <div class="small text-uppercase text-secondary letter-spacing-1 mb-2">Phân khúc</div>
                <div class="storefront-filter-scroll max-h-36">
                    <div th:each="s : ${filterOptions.segments}" class="form-check storefront-filter-segment-wrap"
                         th:attr="data-model-id=${s.modelId}">
                        <input class="form-check-input storefront-filter-segment" type="checkbox"
                               th:value="${s.id}"
                               th:id="|sf-seg-${s.id}|"
                               th:checked="${#lists.contains(listingFilter.segmentIds, s.id)}">
                        <label class="form-check-label small" th:for="|sf-seg-${s.id}|" th:text="${s.name}">Phân khúc</label>
                    </div>
                    <p th:if="${#lists.isEmpty(filterOptions.segments)}" class="small text-muted mb-0">—</p>
                </div>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="storefrontFilterInStock"
                       th:checked="${listingFilter.inStockOnly}">
                <label class="form-check-label small" for="storefrontFilterInStock">Chỉ xe còn hàng</label>
            </div>

            <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill w-100" id="storefrontFilterClear">
                Xóa bộ lọc
            </button>
        </div>
    </div>
</th:block>
</html>
