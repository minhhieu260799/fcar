<!DOCTYPE html>
<!-- Phân công: Nguyên — quên mật khẩu. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body(~{::body})">
<body>
<section class="mx-auto" style="max-width: 480px;" th:object="${form}">
    <h1 class="h4 mb-3 text-center">Quên mật khẩu</h1>

    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger small" role="alert">
        <ul class="mb-0 ps-3">
            <li th:each="err : ${#fields.globalErrors()}" th:text="${err}">Lỗi</li>
        </ul>
    </div>

    <form th:action="@{/auth/forgot-password/send-otp}" th:object="${form}" method="post" class="card card-body mb-3" novalidate>
        <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
        <div class="mb-3">
            <label class="form-label" for="forgotEmail">Email đã đăng ký</label>
            <input type="email" class="form-control" id="forgotEmail"
                   th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"
                   th:field="*{email}" maxlength="150" autocomplete="email"
                   th:readonly="${form.otpSent}">
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Gửi OTP qua email</button>
        <div class="text-center mt-3 small">
            <a th:href="@{/auth/login}" class="link-secondary">Quay lại đăng nhập</a>
        </div>
    </form>

    <div th:if="${form.otpSent}" class="card card-body border border-primary border-opacity-25">
        <h2 class="h6 mb-3">Đặt lại mật khẩu</h2>
        <p class="small text-muted mb-3">Kiểm tra hộp thư (và thư mục spam) để lấy mã OTP.</p>
        <form th:action="@{/auth/forgot-password/reset}" th:object="${form}" method="post" novalidate>
            <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
            <input type="hidden" th:field="*{email}">
            <input type="hidden" th:field="*{otpSent}">
            <div class="mb-3">
                <label class="form-label" for="forgotOtpCode">Mã OTP (6 số)</label>
                <input type="text" class="form-control" id="forgotOtpCode"
                       th:classappend="${#fields.hasErrors('code')} ? ' is-invalid'"
                       th:field="*{code}" maxlength="10" inputmode="numeric" autocomplete="one-time-code">
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="forgotNewPassword">Mật khẩu mới</label>
                <input type="password" class="form-control" id="forgotNewPassword"
                       th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid'"
                       th:field="*{newPassword}" maxlength="255" autocomplete="new-password">
                <div class="form-text small">Tối thiểu 8 ký tự, gồm chữ hoa, số và ký tự đặc biệt.</div>
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label" for="forgotConfirmPassword">Xác nhận mật khẩu mới</label>
                <input type="password" class="form-control" id="forgotConfirmPassword"
                       th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"
                       th:field="*{confirmPassword}" maxlength="255" autocomplete="new-password">
                <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
            </div>
            <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="forgotShowPw" onchange="fcarToggleForgotPasswordVisibility()">
                <label class="form-check-label small" for="forgotShowPw">Hiển thị mật khẩu</label>
            </div>
            <button type="submit" class="btn btn-success w-100">Xác nhận đặt lại mật khẩu</button>
        </form>
    </div>
</section>
<script>
    function fcarToggleForgotPasswordVisibility() {
        var on = document.getElementById('forgotShowPw').checked;
        var n = document.getElementById('forgotNewPassword');
        var c = document.getElementById('forgotConfirmPassword');
        if (n) n.type = on ? 'text' : 'password';
        if (c) c.type = on ? 'text' : 'password';
    }
</script>
</body>
</html>
