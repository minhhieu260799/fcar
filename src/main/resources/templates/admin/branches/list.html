<!DOCTYPE html>
<!-- Phân công: Hiếu — quản lý chi nhánh. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body(~{::body})">
<body>
<section>
    <!-- <h1 class="h4 mb-3">Quản lý chi nhánh</h1> -->
    <div class="mb-3">
        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#addBranchModal">
            Thêm chi nhánh
        </button>
    </div>

    <table id="branchesTable" class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên chi nhánh</th>
            <th>Địa chỉ</th>
            <th>SĐT</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${branches}"
            th:attr="data-id=${b.id},
                     data-name=${#strings.toLowerCase(#strings.trim(b.name))},
                     data-address=${#strings.toLowerCase(#strings.trim(b.address))},
                     data-phone=${#strings.trim(b.phone)}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.name}"></td>
            <td th:text="${b.address}"></td>
            <td th:text="${b.phone}"></td>
            <td>
                <form th:if="${b.status != null and b.status.name() == 'ACTIVE'}" th:action="@{|/admin/branches/${b.id}/disable|}" method="post"
                      style="display:inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-success">Hoạt động</button>
                </form>
                <form th:if="${b.status == null or b.status.name() != 'ACTIVE'}" th:action="@{|/admin/branches/${b.id}/enable|}" method="post"
                      style="display:inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-danger">Tạm ngưng</button>
                </form>
            </td>
            <td>
                <button type="button"
                        class="btn btn-link btn-sm p-0"
                        data-bs-toggle="modal"
                        th:attr="data-bs-target=${'#editBranchModal_' + b.id}">
                    Cập nhật
                </button>
                <form th:action="@{|/admin/branches/${b.id}/delete|}" method="post" style="display:inline"
                      onsubmit="return confirm('Bạn có chắc muốn xóa chi nhánh này? Dữ liệu sẽ không hiển thị nữa.');">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-link btn-sm p-0 text-danger">Xóa</button>
                </form>
                <!-- Modal: cập nhật chi nhánh -->
                <div class="modal fade" th:id="${'editBranchModal_' + b.id}" tabindex="-1"
                     aria-labelledby="editBranchModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <form th:action="@{|/admin/branches/${b.id}|}" method="post" class="modal-content"
                              onsubmit="return confirm('Bạn có chắc rằng muốn cập nhật chi nhánh?');">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                            <div class="modal-header">
                                <h5 class="modal-title" id="editBranchModalLabel">Cập nhật chi nhánh</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row g-3">
                                    <div class="col-md-4">
                                        <label class="form-label">Tên chi nhánh</label>
                                        <input type="text" class="form-control" name="name"
                                               th:value="${b.name}" required>
                                    </div>
                                    <div class="col-md-5">
                                        <label class="form-label">Địa chỉ</label>
                                        <input type="text" class="form-control" name="address"
                                               th:value="${b.address}" required>
                                    </div>
                                    <div class="col-md-3">
                                        <label class="form-label">SĐT</label>
                                        <input type="text"
                                               class="form-control"
                                               name="phone"
                                               th:value="${b.phone}"
                                               required
                                               pattern="\d{10}"
                                               minlength="10"
                                               maxlength="10"
                                               inputmode="numeric"
                                               title="SĐT phải gồm đúng 10 chữ số">
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Modal: thêm chi nhánh -->
    <div class="modal fade" id="addBranchModal" tabindex="-1" aria-labelledby="addBranchModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <form th:action="@{/admin/branches}" th:object="${form}" method="post"
                  class="modal-content" onsubmit="return confirm('Bạn có chắc rằng muốn thêm?');">
                <div class="modal-header">
                    <h5 class="modal-title" id="addBranchModalLabel">Thêm chi nhánh</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Tên chi nhánh</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control" th:field="*{address}" required>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">SĐT</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{phone}"
                                   required
                                   pattern="\d{10}"
                                   minlength="10"
                                   maxlength="10"
                                   inputmode="numeric"
                                   title="SĐT phải gồm đúng 10 chữ số">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">Thêm</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            function setupBranchForm(form, currentId) {
                if (!form) return;
                var table = document.getElementById('branchesTable');
                if (!table) return;
                var rows = table.querySelectorAll('tbody tr');
                var nameInput = form.querySelector('input[name="name"]');
                var addressInput = form.querySelector('input[name="address"]');
                var phoneInput = form.querySelector('input[name="phone"]');

                function clearValidity(input) {
                    if (input) {
                        input.setCustomValidity('');
                    }
                }

                ['input', 'change'].forEach(function (evt) {
                    if (nameInput) nameInput.addEventListener(evt, function () { clearValidity(nameInput); });
                    if (addressInput) addressInput.addEventListener(evt, function () { clearValidity(addressInput); });
                    if (phoneInput) phoneInput.addEventListener(evt, function () { clearValidity(phoneInput); });
                });

                form.addEventListener('submit', function (e) {
                    if (!rows.length) return;
                    var newName = nameInput ? (nameInput.value || '').trim().toLowerCase() : '';
                    var newAddress = addressInput ? (addressInput.value || '').trim().toLowerCase() : '';
                    var newPhone = phoneInput ? (phoneInput.value || '').trim() : '';
                    var hasError = false;

                    rows.forEach(function (row) {
                        if (hasError) {
                            return;
                        }
                        var id = row.getAttribute('data-id');
                        if (currentId && id === currentId.toString()) {
                            return;
                        }
                        var existName = (row.getAttribute('data-name') || '').toLowerCase();
                        var existAddress = (row.getAttribute('data-address') || '').toLowerCase();
                        var existPhone = (row.getAttribute('data-phone') || '');

                        if (newName && existName && newName === existName && nameInput) {
                            nameInput.setCustomValidity('Tên chi nhánh đã tồn tại');
                            nameInput.reportValidity();
                            hasError = true;
                            return;
                        }
                        if (newAddress && existAddress && newAddress === existAddress && addressInput) {
                            addressInput.setCustomValidity('Địa chỉ chi nhánh đã tồn tại');
                            addressInput.reportValidity();
                            hasError = true;
                            return;
                        }
                        if (newPhone && existPhone && newPhone === existPhone && phoneInput) {
                            phoneInput.setCustomValidity('SĐT chi nhánh đã tồn tại');
                            phoneInput.reportValidity();
                            hasError = true;
                            return;
                        }
                    });

                    if (hasError) {
                        e.preventDefault();
                    }
                });
            }

            var addForm = document.querySelector('#addBranchModal form');
            setupBranchForm(addForm, null);

            document.querySelectorAll('[id^="editBranchModal_"]').forEach(function (modal) {
                var id = modal.id.replace('editBranchModal_', '');
                var form = modal.querySelector('form');
                setupBranchForm(form, id);
            });

            // Reset form & validation mỗi lần mở modal
            function setupModalReset(modal) {
                if (!modal) return;
                modal.addEventListener('show.bs.modal', function () {
                    var form = modal.querySelector('form');
                    if (!form) return;
                    form.reset();
                    form.querySelectorAll('input, select, textarea').forEach(function (el) {
                        if (typeof el.setCustomValidity === 'function') {
                            el.setCustomValidity('');
                        }
                    });
                });
            }

            setupModalReset(document.getElementById('addBranchModal'));
            document.querySelectorAll('[id^="editBranchModal_"]').forEach(setupModalReset);
        });
    </script>
</section>
</body>
</html>
