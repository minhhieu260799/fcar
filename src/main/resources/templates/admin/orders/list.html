<!DOCTYPE html>
<!-- Phân công: Minh — quản lý đơn đặt cọc (admin). -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: body(~{::body})}">
<body>
<section>
    <h1 class="h4 mb-3">Quản lý đơn đặt mua xe</h1>
    <form method="get" id="adminOrdersFilterForm" class="row g-2 mb-4 align-items-end">
        <div class="col-md-3 col-lg-2">
            <label class="form-label small mb-1">Năm</label>
            <select name="year" class="form-select form-select-sm" aria-label="Lọc theo năm"
                    onchange="document.getElementById('adminOrdersFilterForm').submit()">
                <option value="" th:selected="${filterYear == null}">Tất cả</option>
                <option th:each="y : ${yearOptions}" th:value="${y}" th:text="${y}"
                        th:selected="${filterYear != null and filterYear == y}"></option>
            </select>
        </div>
        <div class="col-md-3 col-lg-2">
            <label class="form-label small mb-1">Tháng</label>
            <select name="month" class="form-select form-select-sm" aria-label="Lọc theo tháng"
                    onchange="document.getElementById('adminOrdersFilterForm').submit()">
                <option value="" th:selected="${filterMonth == null}">Tất cả</option>
                <option th:each="m : ${#numbers.sequence(1, 12)}" th:value="${m}"
                        th:text="|Tháng ${m}|"
                        th:selected="${filterMonth != null and filterMonth == m}"></option>
            </select>
        </div>
        <div class="col-md-4 col-lg-3">
            <label class="form-label small mb-1">Trạng thái</label>
            <select name="status" class="form-select form-select-sm" aria-label="Lọc theo trạng thái"
                    onchange="document.getElementById('adminOrdersFilterForm').submit()">
                <option value="" th:selected="${status == null}">Tất cả</option>
                <option th:each="s : ${allStatuses}" th:value="${s}"
                        th:text="${@orderStatusLabelFormatter.format(s)}"
                        th:selected="${status != null and status == s}"></option>
            </select>
        </div>
    </form>

    <div class="table-responsive">
        <table class="table table-striped table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Khách hàng</th>
                <th>Xe</th>
                <th>Ngày tạo</th>
                <th>Trạng thái</th>
                <th class="text-nowrap">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="o : ${orders}">
                <td th:text="${o.id}"></td>
                <td th:text="${o.user.fullName}"></td>
                <td th:text="${@carDefinitionLabelFormatter.format(o.carInventory.carDefinition)}"></td>
                <td class="text-nowrap" th:text="${o.createdAt != null ? #temporals.format(o.createdAt, 'dd/MM/yyyy HH:mm') : '—'}"></td>
                <td>
                    <span th:class="${'badge ' + (o.status.name() == 'DEPOSITED' ? 'bg-info text-dark' : (o.status.name() == 'DELIVERED' ? 'bg-success' : (o.status.name() == 'CANCELED' ? 'bg-danger' : (o.status.name() == 'REFUNDED' ? 'bg-primary' : 'bg-secondary'))))}"
                          th:text="${@orderStatusLabelFormatter.format(o.status)}"></span>
                </td>
                <td>
                    <a th:href="@{|/admin/orders/${o.id}|}" class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-eye me-1"></i>Xem chi tiết
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="6" class="text-center text-muted py-5">Không có đơn phù hợp bộ lọc.</td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</body>
</html>
