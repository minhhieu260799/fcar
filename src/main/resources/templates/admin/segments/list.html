<!DOCTYPE html>
<!-- Phân công: Hiếu — quản lý phân khúc xe. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body(~{::body})">
<body>
<section>
    <h1 class="h4 mb-3">Quản lý phân khúc xe</h1>
    <th:block th:if="${error}"><div th:replace="~{fragments/admin-error-toast :: toast(error=${error})}"></div></th:block>
    <div th:replace="~{fragments/admin-success-toast :: toast(success=${success})}"></div>

    <div class="mb-3">
        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#addSegmentModal">
            Thêm phân khúc
        </button>
    </div>

    <form method="get" class="row g-2 mb-3" id="segmentsFilterForm">
        <div class="col-md-4">
            <label class="form-label small mb-1">Thương hiệu</label>
            <select name="brandId" class="form-select" id="brandFilter">
                <option value="" th:selected="${brandId == null}">Tất cả</option>
                <option th:each="b : ${brands}"
                        th:value="${b.id}"
                        th:text="${b.name}"
                        th:selected="${brandId != null and brandId == b.id}">
                </option>
            </select>
        </div>
        <div class="col-md-4">
            <label class="form-label small mb-1">Dòng xe</label>
            <select name="modelId" class="form-select" id="modelFilter"
                    th:attr="data-current-model-id=${modelId}">
                <option value="" th:selected="${modelId == null}">Tất cả</option>
                <option th:each="m : ${models}"
                        th:value="${m.id}"
                        th:text="${m.name}"
                        th:attr="data-brand-id=${m.brand != null ? m.brand.id : 0}"
                        th:selected="${modelId != null and modelId == m.id}">
                </option>
            </select>
        </div>
    </form>

    <table id="segmentsTable" class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Thương hiệu</th>
            <th>Dòng xe</th>
            <th>Tên phân khúc</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="s : ${segments}"
            th:attr="data-id=${s.id},
                     data-model-id=${s.model != null ? s.model.id : ''},
                     data-name=${s.name != null ? #strings.toLowerCase(#strings.trim(s.name)) : ''}">
            <td th:text="${s.id}"></td>
            <td th:text="${s.model != null ? (s.model.brand != null ? s.model.brand.name : '') : ''}"></td>
            <td th:text="${s.model != null ? s.model.name : ''}"></td>
            <td th:text="${s.name}"></td>
            <td>
                <form th:if="${s.active}" th:action="@{|/admin/segments/${s.id}/disable|}" method="post"
                      style="display:inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-success">Hoạt động</button>
                </form>
                <form th:if="${!s.active}" th:action="@{|/admin/segments/${s.id}/enable|}" method="post"
                      style="display:inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-danger">Tạm ngưng</button>
                </form>
            </td>
            <td>
                <button type="button"
                        class="btn btn-link btn-sm p-0"
                        data-bs-toggle="modal"
                        th:attr="data-bs-target=${'#editSegmentModal_' + s.id}">
                    Cập nhật
                </button>
                <form th:action="@{|/admin/segments/${s.id}/delete|}" method="post" style="display:inline"
                      onsubmit="return confirm('Bạn có chắc muốn xóa phân khúc này? Chỉ xóa được khi không còn mẫu xe.');">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-link btn-sm p-0 text-danger">Xóa</button>
                </form>
                <!-- Modal: cập nhật phân khúc -->
                <div class="modal fade" th:id="${'editSegmentModal_' + s.id}" tabindex="-1"
                     aria-labelledby="editSegmentModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <form th:action="@{|/admin/segments/${s.id}|}" method="post" class="modal-content"
                              onsubmit="return confirm('Bạn có chắc rằng muốn cập nhật phân khúc?');">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                            <div class="modal-header">
                                <h5 class="modal-title" id="editSegmentModalLabel">Cập nhật phân khúc</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row g-3 mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Thương hiệu</label>
                                        <input type="text" class="form-control"
                                               th:value="${s.model != null ? (s.model.brand != null ? s.model.brand.name : '') : ''}"
                                               readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Dòng xe</label>
                                        <input type="text" class="form-control"
                                               th:value="${s.model != null ? s.model.name : ''}"
                                               readonly>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Tên phân khúc</label>
                                    <input type="text" class="form-control" name="name"
                                           th:value="${s.name}" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Modal: thêm phân khúc -->
    <div class="modal fade" id="addSegmentModal" tabindex="-1" aria-labelledby="addSegmentModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form th:action="@{/admin/segments}" th:object="${form}" method="post"
                  class="modal-content" onsubmit="return confirm('Bạn có chắc rằng muốn thêm?');">
                <div class="modal-header">
                    <h5 class="modal-title" id="addSegmentModalLabel">Thêm phân khúc</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Thương hiệu</label>
                            <select class="form-select" id="segmentBrandSelect" name="brandId" required
                                    oninvalid="this.setCustomValidity('Vui lòng chọn thương hiệu')"
                                    oninput="this.setCustomValidity('')">
                                <option value="">Chọn thương hiệu</option>
                                <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Dòng xe</label>
                            <select class="form-select" id="segmentModelSelect" name="modelId" required
                                    oninvalid="this.setCustomValidity('Vui lòng chọn dòng xe')"
                                    oninput="this.setCustomValidity('')">
                                <option value="">Chọn dòng xe</option>
                                <option th:each="m : ${models}"
                                        th:value="${m.id}"
                                        th:text="${m.name}"
                                        th:attr="data-brand-id=${m.brand != null ? m.brand.id : 0}">
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Tên phân khúc</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">Thêm</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Lọc model theo thương hiệu trong bộ lọc
            var brandFilter = document.getElementById('brandFilter');
            var modelFilter = document.getElementById('modelFilter');
            var filterForm = document.getElementById('segmentsFilterForm');
            if (brandFilter && modelFilter) {
                var allModelOptions = Array.from(modelFilter.querySelectorAll('option'))
                    .filter(function (opt) { return opt.value !== ''; });

                function refreshModelOptions() {
                    var brandId = brandFilter.value;
                    var currentModelId = modelFilter.getAttribute('data-current-model-id') || '';

                    // Xóa tất cả option trừ "Tất cả"
                    while (modelFilter.options.length > 1) {
                        modelFilter.remove(1);
                    }

                    if (!brandId) {
                        // Khi thương hiệu = Tất cả, chỉ giữ lại "Tất cả"
                        modelFilter.selectedIndex = 0;
                        modelFilter.setAttribute('data-current-model-id', '');
                        return;
                    }

                    allModelOptions.forEach(function (opt) {
                        if (opt.getAttribute('data-brand-id') === brandId) {
                            modelFilter.appendChild(opt.cloneNode(true));
                        }
                    });

                    if (currentModelId) {
                        Array.from(modelFilter.options).forEach(function (opt) {
                            if (opt.value === currentModelId) {
                                opt.selected = true;
                            }
                        });
                    } else {
                        modelFilter.selectedIndex = 0;
                    }
                }

                // Khởi tạo theo trạng thái hiện tại khi load trang
                refreshModelOptions();

                brandFilter.addEventListener('change', function () {
                    // Khi đổi thương hiệu, reset modelId
                    modelFilter.setAttribute('data-current-model-id', '');
                    refreshModelOptions();
                    if (filterForm) {
                        filterForm.submit();
                    }
                });

                modelFilter.addEventListener('change', function () {
                    modelFilter.setAttribute('data-current-model-id', modelFilter.value || '');
                    if (filterForm) {
                        filterForm.submit();
                    }
                });
            }

            // Lọc model theo thương hiệu trong modal Thêm phân khúc
            (function () {
                var brandSelect = document.getElementById('segmentBrandSelect');
                var modelSelect = document.getElementById('segmentModelSelect');
                if (!brandSelect || !modelSelect) {
                    return;
                }

                var allOptions = Array.from(modelSelect.querySelectorAll('option'))
                    .filter(function (opt) {
                        return opt.value !== '';
                    });

                function refreshSegmentModels() {
                    var brandId = brandSelect.value;

                    // Xóa tất cả option trừ placeholder "Chọn dòng xe"
                    while (modelSelect.options.length > 1) {
                        modelSelect.remove(1);
                    }

                    if (!brandId) {
                        modelSelect.selectedIndex = 0;
                        return;
                    }

                    allOptions.forEach(function (opt) {
                        if (opt.getAttribute('data-brand-id') === brandId) {
                            modelSelect.appendChild(opt.cloneNode(true));
                        }
                    });

                    modelSelect.selectedIndex = 0;
                }

                // Khi mở modal, reset lựa chọn
                var addSegmentModal = document.getElementById('addSegmentModal');
                if (addSegmentModal) {
                    addSegmentModal.addEventListener('show.bs.modal', function () {
                        brandSelect.value = '';
                        refreshSegmentModels();
                    });
                }

                brandSelect.addEventListener('change', refreshSegmentModels);

                // Khi submit, nếu chưa chọn thương hiệu hoặc dòng xe, hiển thị bubble lỗi rõ ràng
                var addSegmentForm = document.querySelector('#addSegmentModal form');
                if (addSegmentForm) {
                    addSegmentForm.addEventListener('submit', function (e) {
                        if (!brandSelect.value) {
                            brandSelect.setCustomValidity('Vui lòng chọn thương hiệu');
                            brandSelect.reportValidity();
                            e.preventDefault();
                            return;
                        }
                        if (!modelSelect.value) {
                            modelSelect.setCustomValidity('Vui lòng chọn dòng xe');
                            modelSelect.reportValidity();
                            e.preventDefault();
                            return;
                        }
                        brandSelect.setCustomValidity('');
                        modelSelect.setCustomValidity('');
                    });
                    brandSelect.addEventListener('change', function () {
                        brandSelect.setCustomValidity('');
                    });
                    modelSelect.addEventListener('change', function () {
                        modelSelect.setCustomValidity('');
                    });
                }
            })();

            function setupSegmentForm(form, currentId) {
                if (!form) return;
                var table = document.getElementById('segmentsTable');
                if (!table) return;
                var rows = table.querySelectorAll('tbody tr');
                var nameInput = form.querySelector('input[name="name"]');
                var modelSelect = form.querySelector('select[name="modelId"]');
                if (!nameInput) return;

                function clearValidity() {
                    nameInput.setCustomValidity('');
                }
                nameInput.addEventListener('input', clearValidity);
                nameInput.addEventListener('change', clearValidity);
                if (modelSelect) modelSelect.addEventListener('change', clearValidity);

                form.addEventListener('submit', function (e) {
                    var newName = (nameInput.value || '').trim().toLowerCase();
                    if (!newName) return;
                    var currentModelId = null;
                    if (currentId) {
                        var currentRow = Array.from(rows).filter(function (r) { return r.getAttribute('data-id') === currentId.toString(); })[0];
                        currentModelId = currentRow ? (currentRow.getAttribute('data-model-id') || '') : '';
                    } else if (modelSelect) {
                        currentModelId = modelSelect.value || '';
                    }
                    for (var i = 0; i < rows.length; i++) {
                        var row = rows[i];
                        var id = row.getAttribute('data-id');
                        if (currentId && id === currentId.toString()) continue;
                        var rowModelId = row.getAttribute('data-model-id') || '';
                        var existName = (row.getAttribute('data-name') || '');
                        if (currentModelId && rowModelId === currentModelId && existName && newName === existName) {
                            nameInput.setCustomValidity('Phân khúc đã tồn tại trong dòng xe này');
                            nameInput.reportValidity();
                            e.preventDefault();
                            return;
                        }
                    }
                });
            }

            var addForm = document.querySelector('#addSegmentModal form');
            setupSegmentForm(addForm, null);

            document.querySelectorAll('[id^="editSegmentModal_"]').forEach(function (modal) {
                var id = modal.id.replace('editSegmentModal_', '');
                var form = modal.querySelector('form');
                setupSegmentForm(form, id);
            });

            // Reset form & validation mỗi lần mở modal
            function setupModalReset(modal) {
                if (!modal) return;
                modal.addEventListener('show.bs.modal', function () {
                    var form = modal.querySelector('form');
                    if (!form) return;
                    form.reset();
                    form.querySelectorAll('input, select, textarea').forEach(function (el) {
                        if (typeof el.setCustomValidity === 'function') {
                            el.setCustomValidity('');
                        }
                    });
                });
            }

            setupModalReset(document.getElementById('addSegmentModal'));
            document.querySelectorAll('[id^="editSegmentModal_"]').forEach(setupModalReset);
        });
    </script>
</section>
</body>
</html>
