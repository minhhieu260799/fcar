<!DOCTYPE html>
<!-- Phân công: Hiếu — quản lý dòng xe. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body(~{::body})">
<body>
<section>
    <!-- <h1 class="h4 mb-3">Quản lý dòng xe</h1> -->
    <th:block th:if="${error}"><div th:replace="~{fragments/admin-error-toast :: toast(error=${error})}"></div></th:block>
    <div th:replace="~{fragments/admin-success-toast :: toast(success=${success})}"></div>

    <div class="mb-3">
        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#addModelModal">
            Thêm dòng xe
        </button>
    </div>

    <form method="get" class="row g-2 mb-3" id="modelsFilterForm">
        <div class="col-md-4">
            <label class="form-label small mb-1">Thương hiệu</label>
            <select name="brandId" class="form-select">
            <option value="" th:selected="${brandId == null}">Tất cả</option>
            <option th:each="b : ${brands}"
                    th:value="${b.id}"
                    th:text="${b.name}"
                    th:selected="${brandId != null and brandId == b.id}">
            </option>
            </select>
        </div>
    </form>

    <table id="modelsTable" class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Thương hiệu</th>
            <th>Dòng xe</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${models}"
            th:attr="data-id=${m.id},
                     data-brand-id=${m.brand != null ? m.brand.id : 0},
                     data-name=${#strings.toLowerCase(#strings.trim(m.name))}">
            <td th:text="${m.id}"></td>
            <td th:text="${m.brand != null ? m.brand.name : ''}"></td>
            <td th:text="${m.name}"></td>
            <td>
                <form th:if="${m.active}" th:action="@{|/admin/models/${m.id}/disable|}" method="post"
                      style="display:inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-success">Hoạt động</button>
                </form>
                <form th:if="${!m.active}" th:action="@{|/admin/models/${m.id}/enable|}" method="post"
                      style="display:inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-danger">Tạm ngưng</button>
                </form>
            </td>
            <td>
                <button type="button"
                        class="btn btn-link btn-sm p-0"
                        data-bs-toggle="modal"
                        th:attr="data-bs-target=${'#editModelModal_' + m.id}">
                    Cập nhật
                </button>
                <form th:action="@{|/admin/models/${m.id}/delete|}" method="post" style="display:inline"
                      onsubmit="return confirm('Bạn có chắc muốn xóa dòng xe này? Chỉ xóa được khi không còn phân khúc.');">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-link btn-sm p-0 text-danger">Xóa</button>
                </form>
                <!-- Modal: cập nhật dòng xe -->
                <div class="modal fade" th:id="${'editModelModal_' + m.id}" tabindex="-1"
                     aria-labelledby="editModelModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <form th:action="@{|/admin/models/${m.id}|}" method="post" class="modal-content"
                              onsubmit="return confirm('Bạn có chắc rằng muốn cập nhật dòng xe?');">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                            <div class="modal-header">
                                <h5 class="modal-title" id="editModelModalLabel">Cập nhật dòng xe</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Thương hiệu</label>
                                        <input type="hidden" name="brandId"
                                               th:value="${m.brand != null ? m.brand.id : null}">
                                        <input type="text" class="form-control"
                                               th:value="${m.brand != null ? m.brand.name : ''}"
                                               readonly>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Tên dòng xe</label>
                                        <input type="text" class="form-control" name="name"
                                               th:value="${m.name}" required>
                                    </div>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Modal: thêm dòng xe -->
    <div class="modal fade" id="addModelModal" tabindex="-1" aria-labelledby="addModelModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form th:action="@{/admin/models}" th:object="${form}" method="post"
                  class="modal-content" onsubmit="return confirm('Bạn có chắc rằng muốn thêm?');">
                <div class="modal-header">
                    <h5 class="modal-title" id="addModelModalLabel">Thêm dòng xe</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Thương hiệu</label>
                            <select class="form-select" th:field="*{brandId}" required
                                    oninvalid="this.setCustomValidity('Vui lòng chọn thương hiệu')"
                                    oninput="this.setCustomValidity('')">
                                <option value="">Chọn thương hiệu</option>
                                <option th:each="b : ${brands}" th:value="${b.id}" th:text="${b.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Tên dòng xe</label>
                            <input type="text" class="form-control" th:field="*{name}" required>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">Thêm</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            function setupModelForm(form, currentId) {
                if (!form) return;
                var table = document.getElementById('modelsTable');
                if (!table) return;
                var rows = table.querySelectorAll('tbody tr');
                var brandSelect = form.querySelector('select[name="brandId"]');
                var nameInput = form.querySelector('input[name="name"]');
                if (!brandSelect || !nameInput) return;

                function clearValidity() {
                    nameInput.setCustomValidity('');
                }
                nameInput.addEventListener('input', clearValidity);
                nameInput.addEventListener('change', clearValidity);
                brandSelect.addEventListener('change', clearValidity);

                form.addEventListener('submit', function (e) {
                    var brandId = brandSelect.value;
                    var newName = (nameInput.value || '').trim().toLowerCase();
                    if (!brandId) {
                        brandSelect.setCustomValidity('Vui lòng chọn thương hiệu');
                        brandSelect.reportValidity();
                        e.preventDefault();
                        return;
                    }
                    if (!newName) return;
                    for (var i = 0; i < rows.length; i++) {
                        var row = rows[i];
                        var id = row.getAttribute('data-id');
                        if (currentId && id === currentId.toString()) continue;
                        var rowBrandId = row.getAttribute('data-brand-id');
                        var existName = (row.getAttribute('data-name') || '');
                        if (rowBrandId === brandId && existName && newName === existName) {
                            nameInput.setCustomValidity('Dòng xe đã tồn tại');
                            nameInput.reportValidity();
                            e.preventDefault();
                            return;
                        }
                    }
                });
                brandSelect.addEventListener('change', function () {
                    brandSelect.setCustomValidity('');
                });
            }

            var addForm = document.querySelector('#addModelModal form');
            setupModelForm(addForm, null);

            document.querySelectorAll('[id^="editModelModal_"]').forEach(function (modal) {
                var id = modal.id.replace('editModelModal_', '');
                var form = modal.querySelector('form');
                setupModelForm(form, id);
            });

            // Tự động lọc khi chọn thương hiệu trong bộ lọc
            (function () {
                var filterForm = document.getElementById('modelsFilterForm');
                if (!filterForm) return;
                var filterBrandSelect = filterForm.querySelector('select[name="brandId"]');
                if (!filterBrandSelect) return;
                filterBrandSelect.addEventListener('change', function () {
                    filterForm.submit();
                });
            })();

            // Reset form & validation mỗi lần mở modal
            function setupModalReset(modal) {
                if (!modal) return;
                modal.addEventListener('show.bs.modal', function () {
                    var form = modal.querySelector('form');
                    if (!form) return;
                    form.reset();
                    form.querySelectorAll('input, select, textarea').forEach(function (el) {
                        if (typeof el.setCustomValidity === 'function') {
                            el.setCustomValidity('');
                        }
                    });
                });
            }

            setupModalReset(document.getElementById('addModelModal'));
            document.querySelectorAll('[id^="editModelModal_"]').forEach(setupModalReset);
        });
    </script>
</section>
</body>
</html>
