<!DOCTYPE html>
<!-- Phân công: Hiếu — quản lý người dùng. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body(~{::body})">
<body>
<section>
    <h1 class="h4 mb-3">Quản lý người dùng</h1>
    <table class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Họ tên</th>
            <th>Email</th>
            <th>SĐT</th>
            <th>Roles</th>
            <th>Khóa bởi admin</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="u : ${users}">
            <td th:text="${u.id}"></td>
            <td th:text="${u.fullName}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.phone}">—</td>
            <td>
                <th:block th:each="r : ${u.roles}">
                    <span class="badge bg-secondary me-1" th:text="${r}">CUSTOMER</span>
                </th:block>
            </td>
            <td>
                <span class="badge"
                      th:classappend="${u.lockedByAdmin} ? ' bg-danger' : ' bg-success'"
                      th:text="${u.lockedByAdmin} ? 'Đang khóa' : 'Hoạt động'"></span>
            </td>
            <td>
                <div class="d-flex flex-wrap gap-2">
                    <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/users/{id}(id=${u.id})}">Xem</a>
                    <form th:if="${!u.roles.contains(T(com.fcar.modules.user.entity.enums.UserRole).ADMIN) && !u.lockedByAdmin}"
                          th:action="@{/admin/users/{id}/lock(id=${u.id})}" method="post" class="d-inline">
                        <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Khóa</button>
                    </form>
                    <form th:if="${u.lockedByAdmin}"
                          th:action="@{/admin/users/{id}/unlock(id=${u.id})}" method="post" class="d-inline">
                        <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
                        <button type="submit" class="btn btn-sm btn-outline-success">Mở khóa</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</section>
</body>
</html>
