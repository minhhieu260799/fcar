<!DOCTYPE html>
<!-- Phân công: Minh — quản lý thanh toán (admin). -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: body(~{::body})}">
<body>
<section>
    <h1 class="h4 mb-3">Quản lý thanh toán</h1>

    <h2 class="h5">Cấu hình tỉ lệ</h2>
    <p class="small text-muted mb-2">Khi hủy đơn, số tiền hoàn cho khách luôn bằng <strong>toàn bộ tiền đặt cọc</strong> đã thu.</p>
    <form th:action="@{/admin/payment/config}" th:object="${config}" method="post" class="row g-3 mb-4">
        <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
        <div class="col-md-3">
            <label class="form-label">Tỉ lệ % đặt cọc</label>
            <input type="number" step="0.01" class="form-control" th:field="*{depositPercent}">
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Lưu cấu hình</button>
        </div>
    </form>

    <h2 class="h5">Hotline hỗ trợ</h2>
    <table class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Số hotline</th>
            <th>Active</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="h : ${hotlines}">
            <td th:text="${h.id}"></td>
            <td th:text="${h.phoneNumber}"></td>
            <td>
                <span class="badge"
                      th:classappend="${h.active} ? ' bg-success' : ' bg-secondary'"
                      th:text="${h.active} ? 'Đang bật' : 'Tạm tắt'"></span>
            </td>
            <td>
                <form th:action="@{|/admin/payment/hotlines/${h.id}/toggle|}" method="post" class="d-inline">
                    <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
                    <button type="submit" class="btn btn-sm"
                            th:classappend="${h.active} ? ' btn-outline-danger' : ' btn-outline-success'"
                            th:text="${h.active} ? 'Tắt' : 'Bật'"></button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
    <form th:action="@{/admin/payment/hotlines}" th:object="${hotlineForm}" method="post" class="row g-3 mb-4">
        <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">
        <div class="col-md-4">
            <label class="form-label">Thêm số hotline</label>
            <input type="text" class="form-control" th:field="*{phoneNumber}" required>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Thêm</button>
        </div>
    </form>

</section>
</body>
</html>
