<!DOCTYPE html>
<!-- Phân công: Hiếu — quản lý hãng. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body(~{::body})">
<body>
<section>
    <!-- <h1 class="h4 mb-3">Quản lý hãng</h1> -->
    <div class="mb-3">
        <button type="button"
                class="btn btn-primary"
                data-bs-toggle="modal"
                data-bs-target="#addBrandModal">
            Thêm hãng
        </button>
    </div>

    <table id="brandsTable" class="table table-striped table-hover align-middle">
        <thead>
        <tr>
            <th>ID</th>
            <th>Tên hãng</th>
            <th>Trạng thái</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="b : ${brands}"
            th:attr="data-id=${b.id},
                     data-name=${#strings.toLowerCase(#strings.trim(b.name))}">
            <td th:text="${b.id}"></td>
            <td th:text="${b.name}"></td>
            <td>
                <form th:if="${b.active}" th:action="@{|/admin/brands/${b.id}/disable|}" method="post"
                      style="display:inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-success">Hoạt động</button>
                </form>
                <form th:if="${!b.active}" th:action="@{|/admin/brands/${b.id}/enable|}" method="post"
                      style="display:inline">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-sm btn-danger">Tạm ngưng</button>
                </form>
            </td>
            <td>
                <button type="button"
                        class="btn btn-link btn-sm p-0"
                        data-bs-toggle="modal"
                        th:attr="data-bs-target=${'#editBrandModal_' + b.id}">
                    Cập nhật
                </button>
                <form th:action="@{|/admin/brands/${b.id}/delete|}" method="post" style="display:inline"
                      onsubmit="return confirm('Bạn có chắc muốn xóa hãng này? Chỉ xóa được khi không còn dòng xe.');">
                    <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-link btn-sm p-0 text-danger">Xóa</button>
                </form>
                <!-- Modal: cập nhật hãng -->
                <div class="modal fade" th:id="${'editBrandModal_' + b.id}" tabindex="-1"
                     aria-labelledby="editBrandModalLabel" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <form th:action="@{|/admin/brands/${b.id}|}" method="post" class="modal-content"
                              onsubmit="return confirm('Bạn có chắc rằng muốn cập nhật hãng?');">
                            <input type="hidden" name="_csrf" th:value="${_csrf.token}">
                            <div class="modal-header">
                                <h5 class="modal-title" id="editBrandModalLabel">Cập nhật hãng</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"
                                        aria-label="Close"></button>
                            </div>
                            <div class="modal-body">
                                <div class="mb-3">
                                    <label class="form-label">Tên hãng</label>
                                    <input type="text" class="form-control" name="name"
                                           th:value="${b.name}" required>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                                <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            </div>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <!-- Modal: thêm hãng -->
    <div class="modal fade" id="addBrandModal" tabindex="-1" aria-labelledby="addBrandModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <form th:action="@{/admin/brands}" th:object="${form}" method="post"
                  class="modal-content" onsubmit="return confirm('Bạn có chắc rằng muốn thêm?');">
                <div class="modal-header">
                    <h5 class="modal-title" id="addBrandModalLabel">Thêm hãng</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Tên hãng</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                    <button type="submit" class="btn btn-primary">Thêm</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            function setupBrandForm(form, currentId) {
                if (!form) return;
                var table = document.getElementById('brandsTable');
                if (!table) return;
                var rows = table.querySelectorAll('tbody tr');
                var nameInput = form.querySelector('input[name="name"]');
                if (!nameInput) return;

                function clearValidity() {
                    nameInput.setCustomValidity('');
                }
                nameInput.addEventListener('input', clearValidity);
                nameInput.addEventListener('change', clearValidity);

                form.addEventListener('submit', function (e) {
                    var newName = (nameInput.value || '').trim().toLowerCase();
                    if (!newName) return;
                    for (var i = 0; i < rows.length; i++) {
                        var row = rows[i];
                        var id = row.getAttribute('data-id');
                        if (currentId && id === currentId.toString()) continue;
                        var existName = (row.getAttribute('data-name') || '');
                        if (existName && newName === existName) {
                            nameInput.setCustomValidity('Tên hãng đã tồn tại');
                            nameInput.reportValidity();
                            e.preventDefault();
                            return;
                        }
                    }
                });
            }

            var addForm = document.querySelector('#addBrandModal form');
            setupBrandForm(addForm, null);

            document.querySelectorAll('[id^="editBrandModal_"]').forEach(function (modal) {
                var id = modal.id.replace('editBrandModal_', '');
                var form = modal.querySelector('form');
                setupBrandForm(form, id);
            });

            // Reset form & validation mỗi lần mở modal
            function setupModalReset(modal) {
                if (!modal) return;
                modal.addEventListener('show.bs.modal', function () {
                    var form = modal.querySelector('form');
                    if (!form) return;
                    form.reset();
                    form.querySelectorAll('input, select, textarea').forEach(function (el) {
                        if (typeof el.setCustomValidity === 'function') {
                            el.setCustomValidity('');
                        }
                    });
                });
            }

            setupModalReset(document.getElementById('addBrandModal'));
            document.querySelectorAll('[id^="editBrandModal_"]').forEach(setupModalReset);
        });
    </script>
</section>
</body>
</html>
