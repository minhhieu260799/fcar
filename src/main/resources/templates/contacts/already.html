<!DOCTYPE html>
<!-- Phân công: Bảo — đã gửi liên hệ tư vấn. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: body(~{::body})}">
<body>
<section class="contact-already-page py-2">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card border-0 shadow-sm overflow-hidden">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="text-success mb-3" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 16 16" class="opacity-90">
                            <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                        </svg>
                    </div>
                    <h1 class="h4 fw-semibold mb-2">Đã có yêu cầu tư vấn</h1>
                    <p class="text-secondary mb-1" th:text="${@carDefinitionLabelFormatter.format(car.carDefinition)}">Tên xe</p>
                    <p class="text-muted mb-4 mb-md-5">
                        Bạn đã gửi yêu cầu liên hệ cho mẫu xe này. Chúng tôi sẽ liên hệ với bạn sớm nhất có thể.
                    </p>
                    <div class="d-grid d-sm-flex gap-2 justify-content-center flex-wrap">
                        <a th:href="@{/account/history}" class="btn btn-primary px-4">Xem lịch sử yêu cầu</a>
                        <a th:href="@{|/contacts/request/${car.carDefinition.id}?forceNew=true|}"
                           class="btn btn-outline-secondary px-4">Gửi yêu cầu mới</a>
                        <a th:href="@{|/cars/${car.carDefinition.id}|}" class="btn btn-outline-secondary px-4">Chi tiết xe</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
