<!DOCTYPE html>
<!-- Phân công: Bảo — đã đăng ký lái thử. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: body(~{::body})}">
<body>
<section class="test-drive-already-page py-2">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card border-0 shadow-sm overflow-hidden">
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="text-primary mb-3" aria-hidden="true">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 16 16" class="opacity-90">
                            <path d="M4 9a1 1 0 1 1-2 0 1 1 0 0 1 2 0zm10 0a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM6 8a1 1 0 0 0 0 2h4a1 1 0 1 0 0-2H6ZM4.862 4.276A.5.5 0 0 1 5.24 4h5.52a.5.5 0 0 1 .378.192l1.42 1.776a.5.5 0 0 1-.39.792H2.452a.5.5 0 0 1-.39-.792l1.42-1.776Z"/>
                            <path d="M2.52 3.5h10.96c.345 0 .59.332.503.662l-1.004 4.006A2.5 2.5 0 0 1 10.563 10H5.437a2.5 2.5 0 0 1-2.416-1.832L2.017 4.162c-.087-.33.158-.662.503-.662Z"/>
                        </svg>
                    </div>
                    <h1 class="h4 fw-semibold mb-2">Bạn đã có lịch lái thử</h1>
                    <p class="text-secondary mb-1" th:text="${@carDefinitionLabelFormatter.format(car.carDefinition)}">Tên xe</p>
                    <p class="text-muted mb-4 mb-md-5">
                        Bạn đã đăng ký lái thử mẫu xe này. Xem chi tiết hoặc hủy trong mục lịch sử nếu cần đổi lịch.
                    </p>
                    <div class="d-grid d-sm-flex gap-2 justify-content-center flex-wrap">
                        <a th:href="@{/account/history}" class="btn btn-primary px-4">Xem lịch sử lái thử</a>
                        <a th:href="@{|/test-drives/register/${car.carDefinition.id}?forceNew=true|}"
                           class="btn btn-outline-secondary px-4">Đăng ký thêm lịch khác</a>
                        <a th:href="@{|/cars/${car.carDefinition.id}|}" class="btn btn-outline-secondary px-4">Chi tiết xe</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
