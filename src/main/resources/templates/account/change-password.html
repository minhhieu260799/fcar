<!DOCTYPE html>
<!-- Phân công: Nguyên — đổi mật khẩu. -->
<html xmlns:th="http://www.thymeleaf.org" th:replace="layout :: body(~{::body})">
<body>
<section class="mx-auto" style="max-width: 440px;">
    <h1 class="h4 mb-2 text-center">Đổi mật khẩu</h1>
    <p class="text-muted small text-center mb-4">Để bảo mật tài khoản, hãy dùng mật khẩu mạnh và không dùng lại mật khẩu cũ.</p>

    <div th:if="${param.changed}" class="alert alert-success small py-2" role="alert">
        Đã đổi mật khẩu thành công. Các phiên đăng nhập khác đã được đăng xuất.
    </div>

    <form th:action="@{/account/change-password}" th:object="${form}" method="post" class="card card-body shadow-sm border-0" novalidate>
        <input type="hidden" th:if="${csrfToken != null}" th:name="${csrfToken.parameterName}" th:value="${csrfToken.token}">

        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger small py-2" role="alert">
            <ul class="mb-0 ps-3">
                <li th:each="err : ${#fields.globalErrors()}" th:text="${err}">Lỗi</li>
            </ul>
        </div>

        <div class="mb-3">
            <label class="form-label fw-medium" for="cpCurrent">Mật khẩu hiện tại</label>
            <input type="password" class="form-control" id="cpCurrent"
                   th:classappend="${#fields.hasErrors('currentPassword')} ? ' is-invalid'"
                   th:field="*{currentPassword}" maxlength="255" autocomplete="current-password">
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-medium" for="cpNew">Mật khẩu mới</label>
            <input type="password" class="form-control" id="cpNew"
                   th:classappend="${#fields.hasErrors('newPassword')} ? ' is-invalid'"
                   th:field="*{newPassword}" maxlength="255" autocomplete="new-password">
            <div class="form-text">Tối thiểu 8 ký tự, gồm chữ hoa, số và ký tự đặc biệt.</div>
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></div>
        </div>

        <div class="mb-3">
            <label class="form-label fw-medium" for="cpConfirm">Xác nhận mật khẩu mới</label>
            <input type="password" class="form-control" id="cpConfirm"
                   th:classappend="${#fields.hasErrors('confirmPassword')} ? ' is-invalid'"
                   th:field="*{confirmPassword}" maxlength="255" autocomplete="new-password">
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="cpShowPw" onchange="fcarToggleChangePasswordVisibility()">
            <label class="form-check-label small" for="cpShowPw">Hiển thị mật khẩu</label>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-2">Cập nhật mật khẩu</button>
        <div class="text-center">
            <a th:href="@{/account/profile}" class="small link-secondary">← Quay lại hồ sơ</a>
        </div>
    </form>
</section>
<script>
    function fcarToggleChangePasswordVisibility() {
        var on = document.getElementById('cpShowPw').checked;
        ['cpCurrent', 'cpNew', 'cpConfirm'].forEach(function (id) {
            var el = document.getElementById(id);
            if (el) el.type = on ? 'text' : 'password';
        });
    }
</script>
</body>
</html>
