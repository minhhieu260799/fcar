<!doctype html>
<html lang="vi">
<head><meta charset="UTF-8"><title>FCAR - Login</title><link rel="stylesheet" href="./styles.css"></head>
<body>
  <div class="page">
    <div class="topbar"><div class="logo-wrap"><img class="brand-logo" src="./assets/logo-fcar.svg" alt="FCAR"><div class="logo">FCAR</div></div><div class="menu"><span>Trang chu</span><span class="active">Dang nhap</span></div></div>
    <div class="content" style="display:flex;justify-content:center;align-items:center;min-height:860px;">
      <div class="card" style="width:420px;">
        <h1 class="title" style="font-size:28px;">Dang nhap</h1>
        <div class="alert error">Thong tin dang nhap khong dung</div>
        <label>Email</label><input class="input" value="customer@fcar.vn" />
        <div style="height:10px"></div>
        <label>Mat khau</label><input class="input" type="password" value="********" />
        <div style="height:10px"></div>
        <label><input type="checkbox"> Ghi nho dang nhap</label>
        <div style="height:12px"></div>
        <a class="btn" style="width:100%;text-align:center;">Dang nhap</a>
        <div style="height:10px"></div>
        <a class="btn secondary" style="width:100%;text-align:center;">Dang nhap bang Google</a>
        <div style="height:14px"></div>
        <div class="row">
          <div class="col"><a style="color:#2563eb;font-size:13px;">Quen mat khau?</a></div>
          <div class="col" style="text-align:right;"><a style="color:#2563eb;font-size:13px;">Dang ky tai khoan</a></div>
        </div>
      </div>
    </div>
  </div>
</body>
<script src="./theme.js"></script>
</html>
